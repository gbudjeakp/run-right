version: 2

project_name: runright

before:
  hooks:
    - go mod tidy

builds:
  - id: runright
    main: ./cmd/runright
    binary: runright
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: runright
    ids:
      - runright
    wrap_in_directory: false
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Generate a Software Bill of Materials (SBOM) for each archive using syft.
sboms:
  - artifacts: archive
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents:
      - "{{ .ArtifactName }}.spdx.json"

# Sign the checksums file with cosign (keyless OIDC — no long-lived key needed).
signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - --yes
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"

release:
  github:
    owner: gbudjeakp
    name: run-right
  replace_existing_artifacts: true
  draft: false
  prerelease: auto
  header: |
    ## runright {{ .Tag }}

    Download the binary for your platform below, or use the GitHub Action:
    ```yaml
    - uses: gbudjeakp/run-right@{{ .Tag }}
      with:
        step: start
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
