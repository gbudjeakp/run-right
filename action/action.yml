name: RunRight CI Resource Monitor
description: "Monitor CI job resource usage and get right-sized machine recommendations"
author: "sgbudje"

branding:
  icon: activity
  color: blue

inputs:
  step:
    description: "Action step to run: 'start' or 'stop' (standalone mode)"
    required: false
    default: ""
  run:
    description: "Command to wrap (wrapper mode — runs command with monitoring active)"
    required: false
    default: ""
  duration:
    description: "Max monitoring duration (e.g. 30m). Defaults to unlimited."
    required: false
    default: "0"
  interval:
    description: "Metrics sampling interval (e.g. 5s)"
    required: false
    default: "5s"
  export:
    description: "Comma-separated export backends: file,otlp,prometheus,http"
    required: false
    default: "file"
  output-dir:
    description: "Directory to write metrics files"
    required: false
    default: "${{ github.workspace }}/.runright"
  job-id:
    description: "Unique job identifier (defaults to the GitHub job name)"
    required: false
    default: "${{ github.job }}"
  http-url:
    description: "runright backend URL for http export"
    required: false
    default: ""
  upload-artifact:
    description: "Upload metrics files as a GitHub Artifact"
    required: false
    default: "true"
  version:
    description: "runright binary version to download"
    required: false
    default: "latest"
  github-token:
    description: "GitHub token used to post PR comments (defaults to the built-in token)"
    required: false
    default: "${{ github.token }}"
  pr-comment:
    description: "Post recommendations as a PR comment (true/false)"
    required: false
    default: "true"
  provider:
    description: "Filter recommendations by cloud provider: aws, gcp, or github (default: all)"
    required: false
    default: ""

outputs:
  recommendation-json:
    description: "JSON array of machine recommendations"
    value: ${{ steps.recommend.outputs.result }}
  artifact-url:
    description: "URL of the uploaded metrics artifact"
    value: ${{ steps.upload.outputs.artifact-url }}
  detected-machine:
    description: "Machine type detected at runtime"
    value: ${{ steps.recommend.outputs.detected_machine }}
  suggested-machine:
    description: "Top recommended machine ID"
    value: ${{ steps.recommend.outputs.suggested_machine }}

runs:
  using: composite
  steps:
    # ── Download binary ───────────────────────────────────────────────────────
    - name: Download runright binary
      id: download
      shell: bash
      env:
        RUNRIGHT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/install.sh"

    # ── Wrapper mode ──────────────────────────────────────────────────────────
    - name: Start monitor (wrapper mode)
      if: inputs.run != ''
      shell: bash
      env:
        RUNRIGHT_INTERVAL: ${{ inputs.interval }}
        RUNRIGHT_EXPORT: ${{ inputs.export }}
        RUNRIGHT_OUTPUT_DIR: ${{ inputs.output-dir }}
        RUNRIGHT_JOB_ID: ${{ inputs.job-id }}
        RUNRIGHT_HTTP_URL: ${{ inputs.http-url }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/monitor-start.sh"

    - name: Run wrapped command
      if: inputs.run != ''
      shell: bash
      run: ${{ inputs.run }}

    - name: Stop monitor (wrapper mode)
      if: inputs.run != ''
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/../scripts/monitor-stop.sh"

    # ── Standalone: start step ────────────────────────────────────────────────
    - name: Start monitor (standalone mode)
      if: inputs.step == 'start'
      shell: bash
      env:
        RUNRIGHT_INTERVAL: ${{ inputs.interval }}
        RUNRIGHT_EXPORT: ${{ inputs.export }}
        RUNRIGHT_OUTPUT_DIR: ${{ inputs.output-dir }}
        RUNRIGHT_JOB_ID: ${{ inputs.job-id }}
        RUNRIGHT_HTTP_URL: ${{ inputs.http-url }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/monitor-start.sh"

    # ── Standalone: stop step ─────────────────────────────────────────────────
    - name: Stop monitor (standalone mode)
      if: inputs.step == 'stop'
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/../scripts/monitor-stop.sh"

    # ── Recommend (runs after stop or after wrapped command) ──────────────────
    - name: Generate recommendations
      id: recommend
      if: inputs.step == 'stop' || inputs.run != ''
      shell: bash
      env:
        RUNRIGHT_OUTPUT_DIR: ${{ inputs.output-dir }}
        RUNRIGHT_JOB_ID: ${{ inputs.job-id }}
        RUNRIGHT_PROVIDER: ${{ inputs.provider }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/recommend.sh"

    # ── PR comment ────────────────────────────────────────────────────────────
    - name: Post PR comment
      id: pr-comment
      if: |
        (inputs.step == 'stop' || inputs.run != '') &&
        inputs.pr-comment == 'true' &&
        github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        COMMENT_FILE: /tmp/runright-pr-comment.md
        JOB_LABEL: ${{ inputs.job-id }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs')
          const commentPath = process.env.COMMENT_FILE
          if (!fs.existsSync(commentPath)) { return }

          const body = fs.readFileSync(commentPath, 'utf8')
          const marker = `<!-- runright:${process.env.JOB_LABEL} -->`

          // Find an existing RunRight comment for this job so we update instead
          // of creating a new comment on every push to the PR branch.
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
          })
          const existing = comments.find(c => c.body.includes(marker))

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            })
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            })
          }

    # ── Upload artifact ───────────────────────────────────────────────────────
    - name: Upload metrics artifact
      id: upload
      if: (inputs.step == 'stop' || inputs.run != '') && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: runright-metrics-${{ inputs.job-id }}
        path: ${{ inputs.output-dir }}/
        retention-days: 30
        if-no-files-found: warn
