name: Refresh Machine Catalog
on:
  schedule:
    - cron: "0 6 1,15 * *"   # Runs on the 1st and 15th of every month at 06:00 UTC
  workflow_dispatch:          # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run catalog updater — AWS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: go run ./catalog/updater/aws/... --output catalog/data/aws.json
        continue-on-error: true   # Don't fail if credentials aren't configured

      - name: Run catalog updater — GCP
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: go run ./catalog/updater/gcp/... --output catalog/data/gcp.json
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet catalog/data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/catalog-refresh-${{ github.run_id }}
          title: "chore: refresh machine catalog (${{ github.run_id }})"
          body: |
            Auto-generated catalog refresh from the bi-weekly scheduled workflow.

            Changes were detected in one or more catalog files.
            Please review the diff to ensure the new instance types and pricing look correct before merging.

            ---
            *Generated by the `catalog-refresh` workflow.*
          commit-message: "chore: refresh machine catalog"
          labels: catalog,automated
