name: runright

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: runright
      POSTGRES_USER: runright
      POSTGRES_PASSWORD: runright
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runright"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://runright:runright@postgres:5432/runright?sslmode=disable
      RUNRIGHT_API_KEY: ${RUNRIGHT_API_KEY:-}
      RUNRIGHT_SSO_ENABLED: "true"
      RUNRIGHT_BASE_URL: "http://localhost:8080"
      # SSO Provider credentials (set these to enable providers)
      # RUNRIGHT_SSO_GOOGLE_CLIENT_ID: ""
      # RUNRIGHT_SSO_GOOGLE_CLIENT_SECRET: ""
      # RUNRIGHT_SSO_GITHUB_CLIENT_ID: ""
      # RUNRIGHT_SSO_GITHUB_CLIENT_SECRET: ""
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    working_dir: /app
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://runright:runright@postgres:5432/runright?sslmode=disable
      RUNRIGHT_API_KEY: ${RUNRIGHT_API_KEY:-}
      RUNRIGHT_DISABLE_AUTH: "true"
      RUNRIGHT_SSO_ENABLED: "true"
      RUNRIGHT_BASE_URL: "http://localhost:8080"
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
