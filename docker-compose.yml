name: runright

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: runright
      POSTGRES_USER: runright
      POSTGRES_PASSWORD: runright
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runright"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://runright:runright@postgres:5432/runright?sslmode=disable
      RUNRIGHT_API_KEY: ${RUNRIGHT_API_KEY:-}
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
